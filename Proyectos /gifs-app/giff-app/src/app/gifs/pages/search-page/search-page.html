<h2 class="text-2xl font-bold mt-5">Página de Búsqueda</h2>
<h3 class="text-2xl font-bold mt-5">Busca gifs por su nombre, descripción o etiquetas</h3>

<section class="flex flex-col gap-4">
  <input
    type="text"
    ,
    placeholder="Buscar Gifs"
    ,
    class="mt-3 border-gray-300 rounded-md p-2"
    (keyup.enter)="onSearch(txtSearch.value)"
    #txtSearch
  />
</section>

<section class="py-5">
  <app-gifs-list [gifs]="gifs()"></app-gifs-list>
</section>
