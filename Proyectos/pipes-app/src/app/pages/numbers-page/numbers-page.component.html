<section class="mx-10">
  <h1 class="text-2xl font-bold">Pipes Numéricos</h1>
  <h3 class="text-xl font-thin">Pipes incluidos en Angular</h3>
</section>

<div class="stats stats-vertical shadow h-full">
  <div class="stat">
    <div class="stat-title">Numbers</div>
    <div class="stat-value">{{ totalSells() | number }}</div>
    <div class="stat-desc">{{ totalSells() }}</div>
  </div>

  <div class="stat">
    <div class="stat-title">Percentage</div>
    <div class="stat-value">{{ percentage() | percent : '1.2-2' }}</div>
    <div class="stat-desc">↗︎ 400 (22%)</div>
  </div>

  <div class="stat">
    <div class="stat-title">Total Currency</div>
    <div class="stat-value">{{ totalSells() | currency: 'Bs' : 'symbol' : '1.2-2' }}</div>
    <div class="stat-desc">{{ totalSells() }}</div>
  </div>
</div>
