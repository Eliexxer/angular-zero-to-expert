<h3>Agregar {{ name() }}</h3>
<input
  type="text"
  class="form-control"
  placeholder="nombre del personaje"
  [value]="name()"
  (input)="name.set(txtName.value)"
  #txtName
/>
<h3>Agregar {{ power() }}</h3>
<input
  type="number"
  class="form-control mt-2"
  placeholder="poderes"
  [value]="power()"
  (input)="power.set(+txtPower.value)"
  #txtPower
/>
<button class="btn btn-primary mt-2" (click)="addCharacter()">Agregar</button>
