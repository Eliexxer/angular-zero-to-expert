<section class="mt-5">
  <table class="table table-md mt-2 px-8 w-full">
    <thead>
      <th>#</th>
      <th>Ícono</th>
      <th>Bandera</th>
      <th>Nombre</th>
      <th>Capital</th>
      <th>Población</th>
      <th></th>
    </thead>
    <tbody>
      @for (country of countries(); track country.uuid; let index = $index) {
      <tr>
        <td>{{ index+1 }}</td>
        <td>{{country.flag}}</td>
        <td>
          <img [src]="country.flagSvg" [alt]="country.name" class="w-10" />
        </td>
        <td>{{country.name}}</td>
        <td>{{ country.capital }}</td>
        <td>{{ country.population }}</td>
      </tr>
      }
      <tr></tr>
    </tbody>
  </table>
</section>
